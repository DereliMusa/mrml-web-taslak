<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Giris | MrML Lab</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: var(--bg-base); }
    </style>
</head>
<body>

<div class="login-page">
    <div class="login-box">
        <div class="login-logo">
            <div class="login-logo-text">
                <span class="logo-mr">Mr</span><span class="logo-ml">ML</span><span class="logo-lab"> Lab</span>
            </div>
            <small>Admin Paneli</small>
        </div>

        <div class="login-card">
            <h2>Giris Yap</h2>
            <p>Yonetici hesabinizla veya e-posta ile gonderilen gecici linkle giris yapin.</p>

            <div class="login-tabs">
                <button class="login-tab active" data-tab="admin">Yonetici</button>
                <button class="login-tab" data-tab="token">Gecici Link</button>
            </div>

            <!-- Admin girisi -->
            <div class="login-tab-pane active" id="pane-admin">
                <form id="admin-login-form">
                    <div class="form-group">
                        <label class="form-label">Kullanici Adi / E-posta</label>
                        <input type="text" id="login-username" class="form-control" placeholder="admin" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sifre</label>
                        <input type="password" id="login-password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                    <p id="login-error" class="form-hint" style="color: var(--danger); display: none;"></p>
                    <button type="submit" class="btn btn-gold login-submit" id="login-btn">
                        Giris Yap <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>
            </div>

            <!-- Token girisi -->
            <div class="login-tab-pane" id="pane-token">
                <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px; margin-top: 0;">
                    E-posta ile gonderilen gecici linkin token kodunu girin.
                </p>
                <form id="token-login-form">
                    <div class="form-group">
                        <label class="form-label">Gecici Token</label>
                        <input type="text" id="login-token" class="form-control" placeholder="a3f8c2d1..." autocomplete="off">
                    </div>
                    <p id="token-error" class="form-hint" style="color: var(--danger); display: none;"></p>
                    <button type="submit" class="btn btn-gold login-submit" id="token-btn">
                        Giris Yap <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>

        <p class="login-footer">
            <a href="/" style="color: var(--text-muted);">Ana siteye don</a>
        </p>
    </div>
</div>

<script>
const API = '/api';

// Zaten giris yapilmissa dashboard'a yonlendir
const existingToken = localStorage.getItem('mrml_token');
if (existingToken) {
    fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${existingToken}` } })
        .then(r => { if (r.ok) location.href = '/admin/dashboard.html'; })
        .catch(() => {});
}

// URL'de token parametresi varsa otomatik giris
const urlParams = new URLSearchParams(location.search);
const urlToken = urlParams.get('token');
if (urlToken) {
    document.getElementById('login-token').value = urlToken;
    // Tab'i gecici link'e gec
    document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.login-tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelector('[data-tab="token"]').classList.add('active');
    document.getElementById('pane-token').classList.add('active');
}

// Tab gecisi
document.querySelectorAll('.login-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.login-tab-pane').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`pane-${tab.dataset.tab}`).classList.add('active');
    });
});

// Admin giris formu
document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;

    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spin"></span> Giris yapiliyor...';
    errEl.style.display = 'none';

    try {
        const r = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Giris basarisiz.');
        localStorage.setItem('mrml_token', data.token);
        localStorage.setItem('mrml_user', JSON.stringify(data.user));
        location.href = '/admin/dashboard.html';
    } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Giris Yap <i class="fa-solid fa-arrow-right"></i>';
    }
});

// Token giris formu
document.getElementById('token-login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('token-btn');
    const errEl = document.getElementById('token-error');
    const token = document.getElementById('login-token').value.trim();

    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spin"></span> Dogrulaniyor...';
    errEl.style.display = 'none';

    try {
        const r = await fetch(`${API}/auth/token-login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Gecersiz token.');
        localStorage.setItem('mrml_token', data.token);
        localStorage.setItem('mrml_user', JSON.stringify(data.user));
        location.href = '/admin/dashboard.html';
    } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Giris Yap <i class="fa-solid fa-arrow-right"></i>';
    }
});
</script>

</body>
</html>
